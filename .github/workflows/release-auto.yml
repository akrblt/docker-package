name: Release Automatique

on:
  push:
    tags:
      - 'v*' # Se déclenche uniquement sur les tags comme v1.0, v2.1.4, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour créer la Release
      packages: write  # Requis pour pousser sur GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Build et Push sur GHCR (comme vu précédemment)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      # Étape 3 & 4 : Création de la GitHub Release
      - name: Créer la GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          # Étape 4 : Ajout du SHA dans la description
          body: |
            Nouvelle version automatique.
            SHA du commit : ${{ github.sha }}
            L'image Docker est disponible sur GHCR.
          draft: false
          prerelease: false
          generate_release_notes: true # Génère le changelog automatiquement